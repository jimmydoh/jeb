name: Build MPY Files

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
  workflow_call:
  workflow_dispatch:

jobs:
  build-mpy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CircuitPython mpy-cross
        run: |
          # Build CircuitPython-specific mpy-cross from source
          # Using version 10.1.3 for CircuitPython 10.1.3 compatibility
          CIRCUITPYTHON_VERSION="10.1.3"

          echo "Cloning CircuitPython ${CIRCUITPYTHON_VERSION}..."
          git clone --depth 1 --branch ${CIRCUITPYTHON_VERSION} https://github.com/adafruit/circuitpython.git /tmp/circuitpython || {
            echo "ERROR: Failed to clone CircuitPython repository"
            exit 1
          }

          echo "Installing build dependencies..."
          pip install jinja2 polib huffman

          echo "Building mpy-cross..."
          cd /tmp/circuitpython/mpy-cross
          make || {
            echo "ERROR: Failed to build mpy-cross"
            exit 1
          }

          # Move to a location in PATH
          sudo cp build/mpy-cross /usr/local/bin/

          # Verify installation
          mpy-cross --version

      - name: Determine version
        id: version
        run: |
          # Try multiple methods to determine version, in order of preference:

          # 1. Check for VERSION file in repository
          if [ -f "VERSION" ]; then
            VERSION=$(tr -d '\n\r' < VERSION | xargs)
            echo "Version from VERSION file: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "source=VERSION file" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. Check for version.txt file
          if [ -f "version.txt" ]; then
            VERSION=$(tr -d '\n\r' < version.txt | xargs)
            echo "Version from version.txt: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "source=version.txt file" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 3. Check if we're on a git tag
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            VERSION=$(git describe --exact-match --tags HEAD)
            echo "Version from git tag: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "source=git tag" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 4. Use git describe to generate a version from commits
          if git describe --tags --always --dirty 2>/dev/null; then
            VERSION=$(git describe --tags --always --dirty)
            echo "Version from git describe: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "source=git describe" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 5. Fallback: use date-based version
          VERSION="0.0.0-$(date -u +%Y%m%d.%H%M%S)"
          echo "Version (fallback date-based): $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "source=date-based fallback" >> $GITHUB_OUTPUT

      - name: Create output directory
        run: |
          mkdir -p build/mpy
          echo "Build version: ${{ steps.version.outputs.version }}"
          echo "Version source: ${{ steps.version.outputs.source }}"

      - name: Copy boot.py and code.py as-is
        run: |
          # These files should not be compiled - copy them as-is
          echo "Copying boot.py and code.py as-is (not compiled)..."
          if [ -f "src/boot.py" ]; then
            cp "src/boot.py" "build/mpy/boot.py"
            echo "  ✓ Copied: src/boot.py -> build/mpy/boot.py"
          fi
          if [ -f "src/code.py" ]; then
            cp "src/code.py" "build/mpy/code.py"
            echo "  ✓ Copied: src/code.py -> build/mpy/code.py"
          fi

      - name: Compile Python files to MPY
        run: |
          # Find all .py files in src directory and compile them
          # Exclude boot.py and code.py as they should not be compiled
          # Track compilation results
          success_count=0
          fail_count=0
          failed_files=""

          while IFS= read -r pyfile; do
            # Get the relative path from src
            relpath="${pyfile#src/}"

            # Skip boot.py and code.py - they should not be compiled
            if [ "$relpath" = "boot.py" ] || [ "$relpath" = "code.py" ]; then
              echo "Skipping $pyfile (should not be compiled)"
              continue
            fi

            # Create directory structure in build/mpy
            mkdir -p "build/mpy/$(dirname "$relpath")"
            # Compile to .mpy
            echo "Compiling $pyfile..."
            if mpy-cross "$pyfile" -o "build/mpy/${relpath%.py}.mpy" 2>&1; then
              echo "  ✓ Success: build/mpy/${relpath%.py}.mpy"
              success_count=$((success_count + 1))
            else
              echo "  ✗ Failed: $pyfile"
              if [ -z "$failed_files" ]; then
                failed_files="$pyfile"
              else
                failed_files="$failed_files"$'\n'"$pyfile"
              fi
              fail_count=$((fail_count + 1))
            fi
          done < <(find src -name "*.py" -type f)

          echo ""
          echo "=== Compilation Summary ==="
          echo "Successfully compiled: $success_count files"
          echo "Failed to compile: $fail_count files"

          if [ -n "$failed_files" ]; then
            echo ""
            echo "Failed files:"
            echo "$failed_files"
          fi

      - name: Generate Smart Manifest
        run: |
          python3 << 'EOF'
          import os, json, hashlib

          def calculate_sha256(filepath):
              h = hashlib.sha256()
              with open(filepath, "rb") as f:
                  for chunk in iter(lambda: f.read(4096), b""): h.update(chunk)
              return h.hexdigest()

          build_timestamp = os.popen('date -u +"%Y-%m-%dT%H:%M:%SZ"').read().strip()
          version = os.environ.get('BUILD_VERSION', '0.0.0-unknown')

          manifest = {
              "version": version,
              "build_timestamp": build_timestamp,
              "stats": {},
              "files": []
          }

          FROZEN_DIRS = ["core", "dummies", "managers", "satellites", "transport", "utilities"]
          ROOT_FILES = ["boot.py", "code.py", "updater.mpy"]
          payload_dir = "build/payload"

          # Initialize Size Trackers
          total_size = 0
          sd_update_size = 0
          cp_update_size = 0
          ignored_size = 0

          for root, dirs, files in os.walk(payload_dir):
              for file in files:
                  filepath = os.path.join(root, file)
                  relpath = os.path.relpath(filepath, payload_dir)
                  file_size = os.path.getsize(filepath)

                  total_size += file_size
                  action = "update"

                  # ZONE 1: CircuitPython Drive Files
                  if relpath.startswith("mpy/"):
                      target_path = relpath[4:] # Strip 'mpy/'
                      destination = f"/{target_path}"

                      if target_path in ROOT_FILES:
                          action = "update"
                      elif any(target_path.startswith(fd) for fd in FROZEN_DIRS):
                          action = "ignore_if_frozen"

                      # Route the file size to the correct tracker
                      if action == "ignore_if_frozen":
                          ignored_size += file_size
                      else:
                          cp_update_size += file_size

                      manifest["files"].append({
                          "path": target_path,
                          "download_path": relpath,
                          "sha256": calculate_sha256(filepath),
                          "size": file_size,
                          "action": action,
                          "destination": destination
                      })

                  # ZONE 2: SD Card Files
                  elif relpath.startswith("sd/"):
                      sd_update_size += file_size # Always an update

                      manifest["files"].append({
                          "path": relpath,
                          "download_path": relpath,
                          "sha256": calculate_sha256(filepath),
                          "size": file_size,
                          "action": "update",
                          "destination": f"/{relpath}"
                      })

          # Finalize the stats dictionary
          manifest["stats"] = {
              "total_bytes": total_size,
              "sd_update_bytes": sd_update_size,
              "cp_update_bytes": cp_update_size,
              "ignored_bytes": ignored_size
          }

          manifest["files"].sort(key=lambda x: x["path"])

          with open("build/manifest.json", "w") as f: json.dump(manifest, f, indent=2)

          # We also inject the stats into the lightweight version.json
          with open("build/version.json", "w") as f:
              json.dump({
                  "version": version,
                  "file_count": len(manifest["files"]),
                  "stats": manifest["stats"]
              }, f, indent=2)
          EOF
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Display manifest and version
        run: |
          echo "=== Generated Manifest ==="
          cat build/manifest.json
          echo ""
          echo "=== Generated Version ==="
          cat build/version.json

      - name: Upload MPY files
        uses: actions/upload-artifact@v4
        with:
          name: mpy-files
          path: build/mpy/
          retention-days: 90

      - name: Upload manifest and version
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: |
            build/manifest.json
            build/version.json
          retention-days: 90

      - name: Create release artifacts (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          tar -czf mpy-files.tar.gz mpy/
          zip -r mpy-files.zip mpy/

      - name: Upload release artifacts (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: |
            build/mpy-files.tar.gz
            build/mpy-files.zip
          retention-days: 90
