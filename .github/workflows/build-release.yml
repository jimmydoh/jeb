name: JEB Master Release

on:
  release:
    types: [published] # Only runs when you click "Publish release" in GitHub
  workflow_dispatch: # Allows manual triggering from the Actions tab

# CRITICAL: The runner needs permission to modify the release page
permissions:
  contents: write

jobs:
  # 1. Trigger the Children (These run in parallel)
  build-sd:
    name: Delegate MPY Build
    uses: ./.github/workflows/build-mpy.yml

  build-fw:
    name: Delegate UF2 Build
    uses: ./.github/workflows/build-firmware.yml

  # 2. The Finalizer (Runs only after children finish)
  attach-to-release:
    name: Attach Release Artifacts
    needs: [build-sd, build-fw] # Forces it to wait for the two jobs above
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA Payload
        uses: actions/download-artifact@v4
        with:
          name: ota-payload
          path: ./ota-payload

      - name: Download Manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest
          path: ./manifest

      - name: Download Firmware
        uses: actions/download-artifact@v4
        with:
          name: jeb-master-firmware
          path: ./jeb-master-firmware

      - name: Package Release ZIP
        run: |
          # Combine the payload folders and the manifests into one master zip
          mkdir -p release-staging
          cp -r ./ota-payload/* release-staging/
          cp ./manifest/* release-staging/

          cd release-staging
          zip -r ../jeb-release-package.zip ./*
          cd ..

      - name: Upload to GitHub Release Page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use --repo to prevent the headless runner git error!
          gh release upload ${{ github.event.release.tag_name }} \
            ./jeb-master-firmware/firmware.uf2 \
            ./jeb-release-package.zip \
            --repo ${{ github.repository }} \
            --clobber
