name: JEB Master Release

on:
  release:
    types: [published] # Only runs when you click "Publish release" in GitHub
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Existing Release Tag to attach files to (e.g., nightly, v1.0.0)'
        required: true
        default: 'dev'

# CRITICAL: The runner needs permission to modify the release page
permissions:
  contents: write
  pages: write     # To deploy to GitHub Pages
  id-token: write

jobs:
  # 1. Trigger the Children (These run in parallel)
  build-sd:
    name: Delegate MPY Build
    uses: ./.github/workflows/build-mpy.yml

  build-fw:
    name: Delegate UF2 Build
    uses: ./.github/workflows/build-firmware.yml

  # 2. The Finalizer (Runs only after children finish)
  attach-to-release:
    name: Attach Release Artifacts
    needs: [build-sd, build-fw] # Forces it to wait for the two jobs above
    runs-on: ubuntu-latest

    steps:
      - name: Download mpy-files Artifact
        uses: actions/download-artifact@v4
        with:
          name: mpy-files
          path: ./mpy-files

      - name: Download manifest Artifact
        uses: actions/download-artifact@v4
        with:
          name: manifest
          path: ./manifest

      - name: Download jeb-master-firmware Artifact
        uses: actions/download-artifact@v4
        with:
          name: jeb-master-firmware
          path: ./jeb-master-firmware

      - name: Package SD Assets into a ZIP
        run: |
          # Create a temporary staging folder to build the SD card root structure
          mkdir -p sd-staging/mpy

          # Copy the files into the staging area
          cp -r ./mpy-files/* sd-staging/mpy/
          cp ./manifest/* sd-staging/

          # Zip it all up into a single file
          cd sd-staging
          zip -r ../jeb-release-package.zip ./*
          cd ..

      - name: Upload to GitHub Release Page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name || inputs.target_tag }} \
            ./jeb-master-firmware/firmware.uf2 \
            ./jeb-sd-assets.zip \
            ./manifest/manifest.json \
            ./manifest/version.json \
            --repo ${{ github.repository }} \
            --clobber

      # --- NEW: Prepare the web host files ---
      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We upload the sd-staging folder so manifest.json is at the root
          path: ./sd-staging

  # --- NEW: Deploy to the web host ---
  deploy-to-pages:
    name: Deploy to GitHub Pages
    needs: attach-to-release # Waits for the artifact to be uploaded above
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Execute Deployment
        id: deployment
        uses: actions/deploy-pages@v4
